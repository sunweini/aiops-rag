services:
  elasticsearch:
    image: rag-es-ik:8.11.0
    container_name: rag-es
    restart: unless-stopped
    environment:
      - node.name=es01
      - cluster.name=rag-cluster
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - rag-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ES_PASSWORD:-rag-password} http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5
    container_name: rag-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/rag-password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j-data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - rag-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p rag-password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    restart: unless-stopped
    network_mode: host
    environment:
      - ES_HOST=localhost
      - ES_PORT=9200
      - NEO4J_URI=bolt://localhost:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=rag-password
      - LLM_API_KEY=sk-265a46ad908e477eb7ca81c1885c27bd
      - LLM_MODEL=deepseek-v4-flash
      - LLM_BASE_URL=https://api.deepseek.com/v1
      - EMBEDDING_API_KEY=sk-hpkxelpevbjdabwowsvrtbkvhuscyxgsoecfzktxokdosvpa
      - EMBEDDING_MODEL=Qwen/Qwen3-Embedding-8B
      - EMBEDDING_BASE_URL=https://api.siliconflow.cn/v1
      - RERANK_API_KEY=sk-hpkxelpevbjdabwowsvrtbkvhuscyxgsoecfzktxokdosvpa
      - RERANK_MODEL=Qwen/Qwen3-Reranker-8B
      - RERANK_BASE_URL=https://api.siliconflow.cn/v1
      - LOG_LEVEL=INFO
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    volumes:
      - ./wiki:/app/wiki

volumes:
  es-data:
    driver: local
  neo4j-data:
    driver: local

networks:
  rag-net:
    driver: bridge
