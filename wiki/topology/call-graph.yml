  - 5514
  - 514
  - 5555
  calls:
  - target: svc_logstash
    protocol: udp
    port: 5514
  - target: svc_logstash
    protocol: udp
    port: 514
  - target: svc_logstash
    protocol: tcp
    port: 5555
- id: svc_nginx_company
