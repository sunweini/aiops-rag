services:
- id: svc_es
  name: elasticsearch
  deploys_on: host_es_master_01
  calls:
  - target: svc_es
    protocol: http
    port: 9300
  ports:
  - 9200
  - 9300
  cluster_nodes:
  - host: host_es_master_01
    role: Master + Kibana
    ip: 10.33.17.100
  - host: host_es_master_02
    role: Master
    ip: 10.33.17.101
  - host: host_es_master_03
    role: Master
    ip: 10.33.17.102
  - host: host_es_data_01
    role: Data
    ip: 10.33.17.103
  - host: host_es_data_02
    role: Data
    ip: 10.33.17.104
- id: svc_kibana
  name: kibana
  deploys_on: host_es_master_01
  calls:
  - target: svc_es
    protocol: http
    port: 9200
  ports:
  - 5601
- id: svc_logstash
  name: logstash
  deploys_on: host_logstash_01
  calls:
  - target: svc_es
    protocol: http
    port: 9200
  ports:
  - 5044
  cluster_nodes:
  - host: host_logstash_01
    ip: 10.33.17.105
    role: Syslog + Beats 入口
  - host: host_logstash_02
    ip: 10.33.17.106
    role: Syslog + Beats 入口
- id: svc_syslog
  name: syslog-input
  deploys_on: host_logstash_01
  calls:
  - target: svc_logstash
    protocol: tcp
    port: 5044
  ports:
  - 5514
  - 514
- id: svc_beats
  name: beats-input
  deploys_on: host_logstash_01
